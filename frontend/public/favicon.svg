  <!-- Camera lens -->
  <circle cx="32" cy="35" r="8" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
  <circle cx="32" cy="35" r="4" fill="none" stroke="#D4AF37" stroke-width="1.5"/>

  <!-- Camera top (viewfinder) -->
